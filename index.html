<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday Sumia 🎂</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      overflow:hidden;
      height:100vh;
      background: linear-gradient(135deg,#ff6ec4,#7873f5,#4facfe);
      background-size:400% 400%;
      animation:bgMove 10s ease infinite;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
      position:relative;
      color:white;
    }

    @keyframes bgMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    /* Birthday Card */
    .card{
      width:100%;
      max-width:430px;
      padding:35px 25px;
      border-radius:25px;
      background:rgba(255,255,255,0.15);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,0.25);
      box-shadow:0 10px 35px rgba(0,0,0,0.3);
      text-align:center;
      position:relative;
      z-index:5;
      animation:floatCard 3s ease-in-out infinite;
    }

    @keyframes floatCard{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
    }

    .cake{
      font-size:4rem;
      animation:bounce 1s infinite alternate;
      margin-bottom:10px;
    }

    @keyframes bounce{
      from{transform:translateY(0);}
      to{transform:translateY(-10px);}
    }

    h1{
      font-size:2.2rem;
      margin-bottom:10px;
      line-height:1.3;
    }

    h2{
      font-size:1.1rem;
      color:#fff8d6;
      margin-bottom:20px;
      font-weight:400;
    }

    p{
      font-size:1rem;
      line-height:1.8;
      margin-bottom:25px;
    }

    button{
      background:white;
      color:#ff4f9a;
      border:none;
      padding:14px 28px;
      border-radius:50px;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    button:hover{
      transform:scale(1.08);
    }

    .footer{
      margin-top:20px;
      font-size:0.9rem;
      opacity:0.9;
    }

    /* Balloons */
    .balloon{
      position:absolute;
      bottom:-150px;
      width:60px;
      height:80px;
      border-radius:50%;
      opacity:0.8;
      animation:floatUp linear infinite;
    }

    .balloon::after{
      content:'';
      position:absolute;
      width:2px;
      height:70px;
      background:white;
      top:80px;
      left:50%;
    }

    @keyframes floatUp{
      0%{
        transform:translateX(0) translateY(0) rotate(0deg);
      }
      25%{
        transform:translateX(20px) translateY(-25vh) rotate(5deg);
      }
      50%{
        transform:translateX(-20px) translateY(-50vh) rotate(-5deg);
      }
      75%{
        transform:translateX(15px) translateY(-75vh) rotate(5deg);
      }
      100%{
        transform:translateX(-15px) translateY(-120vh) rotate(-5deg);
      }
    }

    /* Sparkles */
    .sparkle{
      position:absolute;
      width:5px;
      height:5px;
      background:white;
      border-radius:50%;
      animation:sparkle 2s infinite ease-in-out;
      opacity:0.8;
    }

    @keyframes sparkle{
      0%,100%{
        transform:scale(0);
        opacity:0;
      }
      50%{
        transform:scale(1.5);
        opacity:1;
      }
    }

    /* Mobile */
    @media(max-width:480px){
      h1{
        font-size:1.8rem;
      }

      p{
        font-size:0.95rem;
      }

      .card{
        padding:28px 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Balloons -->
  <div class="balloon" style="left:5%; background:#ff4f9a; animation-duration:11s;"></div>
  <div class="balloon" style="left:20%; background:#ffd700; animation-duration:13s;"></div>
  <div class="balloon" style="left:40%; background:#00fff7; animation-duration:10s;"></div>
  <div class="balloon" style="left:60%; background:#7c4dff; animation-duration:14s;"></div>
  <div class="balloon" style="left:80%; background:#ff9966; animation-duration:12s;"></div>

  <!-- Sparkles -->
  <div class="sparkle" style="top:10%; left:20%; animation-delay:0s;"></div>
  <div class="sparkle" style="top:20%; left:70%; animation-delay:1s;"></div>
  <div class="sparkle" style="top:60%; left:15%; animation-delay:2s;"></div>
  <div class="sparkle" style="top:75%; left:80%; animation-delay:1.5s;"></div>
  <div class="sparkle" style="top:40%; left:50%; animation-delay:0.5s;"></div>

  <!-- Card -->
  <div class="card">
    <div class="cake">🎂</div>

    <h1>Happy 18th Birthday</h1>
    <h2>Sumia Akter Pushpo 💖</h2>

    <p>
      May your life always shine with happiness, success, laughter,
      and beautiful memories. 🌸✨  
      You are an amazing sister and deserve all the joy in the world.
      Have the most magical birthday ever! 🎉
    </p>

    <button onclick="celebrate()">Celebrate 🎊</button>

    <div class="footer">
      Made with ❤️ by your loving sibling
    </div>
  </div>

  <!-- Background Music -->
  <audio id="music" loop autoplay>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    // Confetti Function
    function celebrate() {
      launchConfetti();

      const music = document.getElementById("music");
      music.play();
    }

    function launchConfetti() {
      const duration = 4000;
      const end = Date.now() + duration;

      const colors = ['#ff4f9a','#ffffff','#ffd700','#7c4dff','#00fff7'];

      (function frame() {
        confetti({
          particleCount: 8,
          angle: 60,
          spread: 80,
          origin: { x: 0 },
          colors: colors
        });

        confetti({
          particleCount: 8,
          angle: 120,
          spread: 80,
          origin: { x: 1 },
          colors: colors
        });

        confetti({
          particleCount: 12,
          spread: 100,
          origin: { y: 0.6 },
          colors: colors
        });

        if (Date.now() < end) {
          requestAnimationFrame(frame);
        }
      })();
    }

    // Auto Start
    window.onload = () => {
      launchConfetti();

      const music = document.getElementById("music");
      music.play().catch(() => {
        console.log("Autoplay blocked until user interaction.");
      });
    };
  </script>

</body>
</html>
